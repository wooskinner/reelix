<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse — Reelix</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0a0a">
<link rel="icon" href="/icons/icon-192.png">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --red: #e50914;
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --text: #fff;
  --muted: #aaa;
  --radius: 6px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #080808;
  color: var(--text);
  font-family: 'Josefin Sans', sans-serif;
  min-height: 100vh;
}

/* NAV / TOPBAR */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 40px;
  background: rgba(8, 8, 8, .96);
  backdrop-filter: blur(20px);
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid #121212;
}
.brand {
  font-size: 24px;
  font-weight: 700;
  color: var(--red);
  text-decoration: none;
  letter-spacing: 0.5px;
}

/* FILTERS SECTION */
.filters-container {
  display: flex;
  gap: 16px;
  align-items: center;
  margin-bottom: 24px;
}
select {
  background: var(--surface);
  color: var(--text);
  border: 1px solid #333;
  padding: 8px 16px;
  font-family: inherit;
  font-size: 14px;
  border-radius: var(--radius);
  outline: none;
  cursor: pointer;
}
select:focus {
  border-color: var(--red);
}

/* MAIN CONTENT WRAPPER */
.content-body {
  padding: 40px;
}
.catalog-header {
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 20px;
  letter-spacing: .3px;
}

/* SECURE PAYWALL OVERLAY */
.paywall-wrapper {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(5, 5, 5, 0.98);
  z-index: 10000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.paywall-box {
  background: var(--surface);
  border: 1px solid #222;
  padding: 40px;
  border-radius: 12px;
  max-width: 460px;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}
.paywall-box h2 {
  font-size: 28px;
  margin-bottom: 12px;
  color: #fff;
}
.paywall-box p {
  color: var(--muted);
  font-size: 15px;
  line-height: 1.6;
  margin-bottom: 24px;
}
.paywall-box .btn-pay {
  background: var(--red);
  color: #fff;
  border: none;
  padding: 14px 28px;
  font-size: 16px;
  font-weight: 600;
  border-radius: var(--radius);
  cursor: pointer;
  width: 100%;
  text-decoration: none;
  display: inline-block;
  transition: background 0.2s;
}
.paywall-box .btn-pay:hover {
  background: #b80710;
}
.paywall-box .alt-action {
  margin-top: 16px;
  font-size: 14px;
}
.paywall-box .alt-action a {
  color: var(--muted);
  text-decoration: underline;
  cursor: pointer;
}

@media(max-width: 768px) {
  .topbar { padding: 14px 20px; }
  .content-body { padding: 24px 20px; }
}
</style>
</head>
<body>

  <nav class="topbar">
    <a href="index.html" class="brand">REELIX</a>
  </nav>

  <div class="content-body">
    <div class="filters-container">
      <select id="filter-genre">
        <option value="">All Genres</option>
        <option value="28">Action</option>
        <option value="35">Comedy</option>
        <option value="18">Drama</option>
        <option value="27">Horror</option>
        <option value="10749">Romance</option>
        <option value="53">Thriller</option>
      </select>

      <select id="filter-year">
        <option value="">All Years</option>
      </select>
    </div>

    <h3 class="catalog-header">Catalog Library Content Feed</h3>
    </div>

  <div id="browse-paywall" class="paywall-wrapper" style="display:none;">
    <div class="paywall-box">
       <h2 id="pw-title">Access Restricted</h2>
       <p id="pw-desc">A premium subscription activation is required to unlock viewing licenses across the Reelix database directory system.</p>
       <a href="https://selar.co/m/reelix" class="btn-pay">Subscribe Now</a>
       <div class="alt-action">
         <a id="pw-alt-btn" onclick="window.location.href='activate.html'">Already purchased? Claim access</a>
       </div>
    </div>
  </div>

<script type="module">
  import { getFirebaseInstances } from './firebase-init.js';

  // 1. Dynamic Quality of Life Year Calculator Range Loop Engine Setup
  const yearSelectorElement = document.getElementById('filter-year');
  if (yearSelectorElement) {
    const finalYearLimit = new Date().getFullYear();
    const historicalFloorYear = 1960;
    
    let optionsBuffer = '<option value="">All Years</option>';
    for (let currentLoopYear = finalYearLimit; currentLoopYear >= historicalFloorYear; currentLoopYear--) {
      optionsBuffer += `<option value="${currentLoopYear}">${currentLoopYear}</option>`;
    }
    yearSelectorElement.innerHTML = optionsBuffer;
  }

  // 2. Fetch required centralized architecture instances
  const { auth, db } = await getFirebaseInstances();
  const { doc, getDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  const { onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");

  function showBrowsePaywall(title, desc) {
    if (title) document.getElementById('pw-title').textContent = title;
    if (desc) document.getElementById('pw-desc').textContent = desc;
    document.getElementById('browse-paywall').style.display = 'flex';
  }

  // 3. Subscription authorization pipeline monitor
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      showBrowsePaywall();
      return;
    }

    try {
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (!snap.exists()) { 
        showBrowsePaywall(); 
        return; 
      }

      const data = snap.data();

      // Active premium verified subscription validation mapping match
      if (data.plan === 'active' && data.subscriptionEnd) {
        if (new Date(data.subscriptionEnd) > new Date()) {
          localStorage.setItem('reelix-paid', 'true');
          return; // ✅ Access and streaming initialization clear
        } else {
          showBrowsePaywall('Subscription Expired', 'Your subscription package session validation timeline run has lapsed.');
          return;
        }
      }

      // Free trial period validation evaluation match 
      if (data.trialEnd) {
        if (new Date(data.trialEnd) > new Date()) {
          return; // ✅ Active trial timeline session clear
        } else {
          showBrowsePaywall('Trial Expired', 'Your trial period validation bounds have timed out.');
          return;
        }
      }

      showBrowsePaywall();

    } catch (err) {
      console.warn('Firestore fallback caching loop validation checking:', err);
      const saved = localStorage.getItem('reelix-trial');
      if (saved) {
        try {
          if (new Date(JSON.parse(saved).end) > new Date()) return;
        } catch {}
      }
      showBrowsePaywall();
    }
  });
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
