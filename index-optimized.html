<!-- Deferred Firebase (async prevents render blocking) -->
<script async type="module">
import { getFirebaseInstances } from '/firebase-init.js';
import { getCachedSubscription, cacheSubscription, invalidateSubscriptionCache } from '/subscription-cache.js';

let auth, db;

async function initFirebase() {
  if (auth) return;
  const { auth: _auth, db: _db } = await getFirebaseInstances();
  auth = _auth;
  db = _db;
}

async function checkTrialStatus() {
  // Paint instantly from cache if we have it — don't wait on Firebase SDK load first
  const cachedFirst = getCachedSubscription();
  if (cachedFirst) applySubscriptionState(cachedFirst);

  await initFirebase();
  const { onAuthStateChanged } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
  
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      document.getElementById('nav-trial-badge').style.display = 'none';
      return;
    }
    
    const cached = getCachedSubscription();
    if (cached) {
      applySubscriptionState(cached);
      return;
    }
    
    try {
      const { getDoc, doc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (snap.exists()) {
        const data = snap.data();
        cacheSubscription(data);
        applySubscriptionState(data);
      }
    } catch (e) {
      console.warn('Subscription sync error:', e);
    }
  });
}

function applySubscriptionState(data) {
  const badge = document.getElementById('nav-trial-badge');
  const payNowBtn = document.getElementById('nav-pay-now-btn');
  
  if (data.plan === 'active' && data.subscriptionEnd) {
    if (new Date(data.subscriptionEnd) > new Date()) {
      badge.style.display = 'none';
      return;
    }
  }
  
  if (data.trialEnd) {
    const end = new Date(data.trialEnd);
    if (end > new Date()) {
      badge.style.display = 'flex';
      const days = Math.ceil((end - new Date()) / (1000 * 60 * 60 * 24));\n      document.getElementById('trial-days-label').innerText = `${days}d left`;
      return;
    }
  }
  
  badge.style.display = 'flex';
  document.getElementById('trial-pill-nav').classList.add('expired');
  document.querySelector('.trial-dot').classList.add('expired-dot');
  payNowBtn.classList.add('expired', 'show');
}

document.addEventListener('DOMContentLoaded', checkTrialStatus);
</script>
