<script type="module">
import { fetchProxy } from './api.js';

let heroMovie = null;

async function loadHero() {
  const data = await fetchProxy('trending/movie/week');
  if (!data || !data.results) return;
  
  heroMovie = data.results[Math.floor(Math.random() * 6)];
  const h = document.getElementById('hero');
  // Note: Images are still fetched from TMDB Image CDN directly (safe)
  h.style.backgroundImage = `url(https://image.tmdb.org/t/p/original${heroMovie.backdrop_path})`;
  document.getElementById('hero-title').innerText = heroMovie.title;
  document.getElementById('hero-desc').innerText = heroMovie.overview;
  document.getElementById('hero-rating').innerText = heroMovie.vote_average.toFixed(1);
  document.getElementById('hero-year').innerText = heroMovie.release_date?.slice(0,4) || '';
}

async function fetchRow(endpoint, containerId, type, style, showRank = false) {
  const data = await fetchProxy(endpoint);
  if (data && data.results) {
    buildCards(data.results, containerId, type, style, showRank);
  }
}

// Updated Search Logic
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  if (!q) return;
  
  clearTimeout(window.searchTimeout);
  window.searchTimeout = setTimeout(async () => {
    const data = await fetchProxy('search/multi', `?query=${encodeURIComponent(q)}`);
    // ... render results ...
  }, 350);
});

// Initialize
loadHero();
fetchRow('trending/movie/week', 'trending-list', 'movie', 'landscape', true);
fetchRow('movie/top_rated', 'top-list', 'movie', 'portrait');
// ... other rows
</script>
