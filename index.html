<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reelix - Stream & Download</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #e50914;
            --background-color: #111;
            --card-background: #181818;
            --text-color: #fff;
            --text-muted: #aaa;
            --nav-bg: rgba(17, 17, 17, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
            transition: background 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 4%;
        }

        nav.scrolled {
            background-color: var(--nav-bg);
            border-bottom: 1px solid #222;
        }

        .logo {
            color: var(--primary-color);
            font-size: 1.8rem;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--primary-color);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .search-box {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-box input {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #444;
            color: #fff;
            padding: 6px 12px 6px 35px;
            border-radius: 4px;
            outline: none;
            width: 0;
            transition: width 0.4s ease, border-color 0.4s;
            opacity: 0;
            visibility: hidden;
        }

        .search-box.active input {
            width: 200px;
            opacity: 1;
            visibility: visible;
            border-color: var(--primary-color);
        }

        .search-box i {
            position: absolute;
            left: 10px;
            cursor: pointer;
            color: var(--text-color);
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Hero Billboard */
        .hero {
            position: relative;
            height: 85vh;
            background-size: cover;
            background-position: center center;
            display: flex;
            align-items: center;
            padding: 0 4%;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, var(--background-color) 0%, rgba(0,0,0,0.3) 60%, rgba(0,0,0,0.7) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 10;
            max-width: 600px;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.1;
        }

        .hero-overview {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 25px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
            text-decoration: none;
        }

        .btn:hover {
            opacity: 0.85;
            transform: scale(1.02);
        }

        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-secondary { background-color: rgba(109, 109, 110, 0.7); color: white; }

        /* Rows and Cards */
        .main-container {
            padding: 30px 4% 60px 4%;
            position: relative;
            z-index: 20;
            margin-top: -80px;
        }

        .row-container {
            margin-bottom: 40px;
        }

        .row-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #e5e5e5;
        }

        .row-posters {
            display: flex;
            overflow-x: auto;
            overflow-y: hidden;
            gap: 12px;
            padding: 10px 0;
            scrollbar-width: none; /* Firefox */
        }

        .row-posters::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        .poster-card {
            flex: 0 0 auto;
            width: 180px;
            aspect-ratio: 2/3;
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease;
            background-color: var(--card-background);
            position: relative;
        }

        .poster-card:hover {
            transform: scale(1.06);
            z-index: 30;
        }

        .poster-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Modal Overlay */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            padding: 20px;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background-color: var(--card-background);
            width: 100%;
            max-width: 850px;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
            transform: translateY(30px);
            transition: transform 0.3s ease;
        }

        .modal.active .modal-content {
            transform: translateY(0);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            font-size: 1.2rem;
        }

        .modal-backdrop {
            height: 400px;
            background-size: cover;
            background-position: center top;
            position: relative;
        }

        .modal-backdrop::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, var(--card-background) 0%, transparent 100%);
        }

        .modal-info {
            padding: 30px;
            margin-top: -60px;
            position: relative;
            z-index: 5;
        }

        .modal-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .modal-metadata {
            display: flex;
            gap: 15px;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 15px;
            align-items: center;
        }

        .rating { color: #46d369; font-weight: 700; }

        .modal-overview {
            font-size: 1.05rem;
            color: #ddd;
            margin-bottom: 25px;
            max-width: 700px;
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>

    <!-- Top Navigation -->
    <nav id="mainNav">
        <div style="display: flex; align-items: center; gap: 40px;">
            <a href="#" class="logo">REELIX</a>
            <ul class="nav-links">
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">TV Shows</a></li>
                <li><a href="#">Movies</a></li>
                <li><a href="#">African</a></li>
            </ul>
        </div>
        <div class="nav-actions">
            <div class="search-box" id="searchBox">
                <i class="fas fa-search" id="searchIcon"></i>
                <input type="text" placeholder="Titles, genres, people...">
            </div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" alt="Profile" class="avatar" id="profileMenu">
        </div>
    </nav>

    <!-- Hero Billboard View -->
    <header class="hero" id="heroBillboard">
        <div class="hero-content">
            <h1 class="hero-title" id="heroTitle">Loading Feature...</h1>
            <p class="hero-overview" id="heroOverview">Fetching the latest blockbusters directly to your streaming dashboard.</p>
            <div style="display: flex; gap: 15px;">
                <button class="btn btn-primary" id="heroPlayBtn"><i class="fas fa-play"></i> Play</button>
                <button class="btn btn-secondary" id="heroInfoBtn"><i class="fas fa-info-circle"></i> More Info</button>
            </div>
        </div>
    </header>

    <!-- Media Row Tracks -->
    <main class="main-container">
        <section class="row-container" id="trendingRow">
            <h2 class="row-title">Trending Now</h2>
            <div class="row-posters" id="trendingPosters"></div>
        </section>

        <section class="row-container" id="topRatedRow">
            <h2 class="row-title">Top Rated</h2>
            <div class="row-posters" id="topRatedPosters"></div>
        </section>

        <section class="row-container" id="africanRow">
            <h2 class="row-title">African Stories</h2>
            <div class="row-posters" id="africanPosters"></div>
        </section>
    </main>

    <!-- Central Interactive Information/Details Modal -->
    <div class="modal" id="movieModal">
        <div class="modal-content">
            <button class="modal-close" id="closeModal"><i class="fas fa-times"></i></button>
            <div class="modal-backdrop" id="modalBackdrop"></div>
            <div class="modal-info">
                <h2 class="modal-title" id="modalTitle">Media Title</h2>
                <div class="modal-metadata">
                    <span class="rating" id="modalRating">00% Match</span>
                    <span id="modalYear">2026</span>
                    <span id="modalDuration">1h 45m</span>
                </div>
                <p class="modal-overview" id="modalOverview">Detailed content plot overview goes here.</p>
                <div class="modal-actions">
                    <button class="btn btn-primary"><i class="fas fa-play"></i> Play</button>
                    <!-- Download button target for the intercepting hook -->
                    <button class="btn btn-secondary btn-download"><i class="fas fa-download"></i> Download</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Logic Layer Hooks -->
    <script>
        // Config Parameters
        const TMDB_API_KEY = 'YOUR_TMDB_API_KEY'; // Replace with active system token
        const BASE_IMAGE_URL = 'https://image.tmdb.org/t/p/original';
        const POSTER_IMAGE_URL = 'https://image.tmdb.org/t/p/w500';

        // Interface Node Selectors
        const mainNav = document.getElementById('mainNav');
        const searchBox = document.getElementById('searchBox');
        const searchIcon = document.getElementById('searchIcon');
        const movieModal = document.getElementById('movieModal');
        const closeModal = document.getElementById('closeModal');

        // Scroll Tracker for Nav Header
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                mainNav.classList.add('scrolled');
            } else {
                mainNav.classList.remove('scrolled');
            }
        });

        // Search Slide Interactivity
        searchIcon.addEventListener('click', () => {
            searchBox.classList.toggle('active');
            if (searchBox.classList.contains('active')) {
                searchBox.querySelector('input').focus();
            }
        });

        // Initialize Mock Data / TMDB API Call simulation
        async function fetchRowData() {
            // Demonstration fallback array representing dynamic content sets
            const fallbackMovies = [
                { id: 278, title: "The Shawshank Redemption", overview: "Framed in the 1940s for the double murder of his wife and her lover, upstanding banker Andy Dufresne begins a new life at the Shawshank prison.", backdrop_path: "/zfb523Ih3mY2gVv0vVfe7Y7pLMq.jpg", poster_path: "/9cqN00TDP98OREIwR43wZg3MvKq.jpg", release_date: "1994-09-23", vote_average: 8.7, type: "movie" },
                { id: 155, title: "The Dark Knight", overview: "Batman raises the stakes in his war on crime. With the help of Lt. Jim Gordon and District Attorney Harvey Dent, Batman sets out to dismantle the remaining crimergs.", backdrop_path: "/oXw2w6g77HLLtcYn8YgI6z87gG5.jpg", poster_path: "/qJ2tWGB2m86OXNhg63g696g36vY.jpg", release_date: "2008-07-16", vote_average: 8.5, type: "movie" },
                { id: 1396, title: "Breaking Bad", overview: "Walter White, a New Mexico chemistry teacher, turns to manufacturing methamphetamine to secure his family's financial future after being diagnosed with terminal cancer.", backdrop_path: "/9fa9McMc3wGZ82vPwYv8FTg8n9g.jpg", poster_path: "/ztvAB8jG6Z79g6g6M6vY8ZgG6z8.jpg", release_date: "2008-01-20", vote_average: 8.9, type: "tv" }
            ];

            renderRow(fallbackMovies, 'trendingPosters');
            renderRow(fallbackMovies, 'topRatedPosters');
            renderRow(fallbackMovies, 'africanPosters');
            
            // Populate Hero Background using index element 1
            setupHero(fallbackMovies[1]);
        }

        function setupHero(movie) {
            document.getElementById('heroBillboard').style.backgroundImage = `url('${BASE_IMAGE_URL}${movie.backdrop_path}')`;
            document.getElementById('heroTitle').innerText = movie.title || movie.name;
            document.getElementById('heroOverview').innerText = movie.overview;
            
            document.getElementById('heroInfoBtn').onclick = () => showModal(movie);
        }

        function renderRow(movies, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            movies.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'poster-card';
                card.innerHTML = `<img src="${POSTER_IMAGE_URL}${movie.poster_path}" alt="${movie.title || movie.name}">`;
                card.addEventListener('click', () => showModal(movie));
                container.appendChild(card);
            });
        }

        // Modal Presentation Management
        function showModal(media) {
            movieModal.setAttribute('data-id', media.id);
            movieModal.setAttribute('data-type', media.type || 'movie');
            
            document.getElementById('modalTitle').innerText = media.title || media.name;
            document.getElementById('modalOverview').innerText = media.overview;
            document.getElementById('modalBackdrop').style.backgroundImage = `url('${BASE_IMAGE_URL}${media.backdrop_path}')`;
            document.getElementById('modalRating').innerText = `${Math.round(media.vote_average * 10)}% Match`;
            document.getElementById('modalYear').innerText = new Date(media.release_date || media.first_air_date).getFullYear();

            movieModal.classList.add('active');
        }

        closeModal.addEventListener('click', () => movieModal.classList.remove('active'));
        movieModal.addEventListener('click', (e) => {
            if (e.target === movieModal) movieModal.classList.remove('active');
        });

        // ==========================================
        // PRODUCTION DOWNLOAD HOOK & INTERCEPTOR
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            // Seed local trial storage profile for demo authentication seamlessly if absent
            if(!localStorage.getItem('reelix_user')) {
                localStorage.setItem('reelix_user', JSON.stringify({ name: "Guest Viewer", access: "premium" }));
            }

            const downloadBtn = movieModal.querySelector('.btn-download');
            if (downloadBtn) {
                downloadBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    
                    const movieId = movieModal.getAttribute('data-id');
                    const mediaType = movieModal.getAttribute('data-type') || 'movie';
                    const movieTitle = document.getElementById('modalTitle')?.innerText || 'Media';

                    handleReelixDownload(movieId, mediaType, movieTitle);
                });
            }
            
            fetchRowData();
        });

        function handleReelixDownload(id, type, title) {
            const userJson = localStorage.getItem('reelix_user') || sessionStorage.getItem('reelix_user');
            const user = userJson ? JSON.parse(userJson) : null;

            if (!user) {
                alert('Please sign in to unlock high-speed downloads and offline viewing privileges.');
                return;
            }

            const downloadUrl = `https://vidsrc.me/embed/${type}?tmdb=${id}`; 
            const downloadBtn = movieModal.querySelector('.btn-download');
            const originalText = downloadBtn.innerHTML;
            
            // Spinner configuration UI Update
            downloadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating Link...';

            setTimeout(() => {
                downloadBtn.innerHTML = originalText;
                const downloadWindow = window.open(downloadUrl, '_blank', 'noopener,noreferrer');
                if (!downloadWindow) {
                    window.location.href = downloadUrl;
                }
            }, 800);
        }
    </script>
</body>
</html>
