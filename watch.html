<script type="module">
import { fetchProxy } from './api.js';

async function initWatch() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const type = params.get('type');

    // Fetch Details via Proxy
    const m = await fetchProxy(`${type}/${id}`, `?append_to_response=videos,credits,recommendations`);
    
    if (m) {
        document.title = `Watching ${m.title || m.name} — Reelix`;
        // Setup Player
        if (type === 'tv') {
            setupTVUI(m);
        } else {
            loadPlayer(id, type);
        }
        renderSimilar(m.recommendations?.results || []);
    }
}

async function loadEpisodes() {
    const season = document.getElementById('season-select').value;
    const data = await fetchProxy(`tv/${mediaId}/season/${season}`);
    if (data && data.episodes) {
        renderEpisodes(data.episodes);
    }
}

initWatch();
</script>
