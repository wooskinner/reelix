<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  
<!-- Primary Meta Tags -->
<title>Reelix - Watch</title>
<meta name="title" content="Reelix - Stream Movies & TV Shows">
<meta name="description" content="Watch unlimited movies, TV shows, and African originals on Reelix.">
<meta name="robots" content="noindex, follow">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" href="/icons/icon-192.png">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Reelix">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://api.themoviedb.org">
<link rel="preconnect" href="https://image.tmdb.org">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --red:#E3B873;
  --red-dark:#C89A5B;
  --red-glow:rgba(227,184,115,.18);
  --gold-bright:#F3D6A0;
  --emerald:#1E6B58;
  --emerald-bright:#4FD8AE;
  --ink:#241505;
  --bg:#0D0B14;
  --surface:#170F26;
  --surface2:#1D1330;
  --surface3:#241A3A;
  --text:#fff;
  --muted:#A79BC0;
  --muted2:#6E6285;
  --radius:8px;
  --nav-h:64px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Manrope',sans-serif;overflow-x:hidden;position:relative;padding-top:var(--nav-h);}
body::before{
  content:'';position:fixed;inset:0;z-index:-2;
  background:
    radial-gradient(ellipse 60% 45% at 12% 8%, rgba(227,184,115,.13) 0%, transparent 60%),
    radial-gradient(ellipse 55% 50% at 90% 15%, rgba(60,29,92,.45) 0%, transparent 65%),
    radial-gradient(ellipse 70% 55% at 50% 95%, rgba(30,107,88,.12) 0%, transparent 60%),
    linear-gradient(180deg,#0D0B14 0%,#150C24 45%,#0D0B14 100%);
}

/* ─── NAV ─── */
.nav{
  position:fixed;top:0;width:100%;z-index:1000;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 48px;height:var(--nav-h);
  background:rgba(13,11,20,.96);
  backdrop-filter:blur(20px);
  box-shadow:0 1px 0 rgba(255,255,255,.05);
}
.logo{
  font-family:'Fraunces',serif;font-style:italic;font-weight:600;
  font-size:22px;color:var(--gold-bright);letter-spacing:.5px;
  cursor:pointer;text-decoration:none;
  display:inline-block;
  transition:opacity .2s;
}
.logo:hover{opacity:.85;}
.nav-right{display:flex;align-items:center;gap:16px;}

.nav-btn{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  color:var(--text);padding:8px 16px;border-radius:20px;
  cursor:pointer;font-size:13px;font-family:inherit;
  display:flex;align-items:center;gap:6px;
  transition:background .2s,border-color .2s;
  white-space:nowrap;
  text-decoration:none;
}
.nav-btn:hover{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.2);}
.nav-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;}

/* ─── WATCH CONTAINER ─── */
.watch-container{
  max-width:1200px;margin:30px auto;padding:0 48px;
}
.video-wrapper{
  position:relative;padding-top:56.25%;
  background:#000;border-radius:12px;overflow:hidden;
  box-shadow:0 24px 64px rgba(0,0,0,.7);
  border:1px solid rgba(255,255,255,.06);
}
.video-wrapper iframe{
  position:absolute;inset:0;width:100%;height:100%;border:none;
}

/* ─── MEDIA DETAILS ─── */
.media-details{
  margin-top:32px;background:var(--surface);
  border:1px solid rgba(227,184,115,.14);
  padding:32px;border-radius:14px;
  box-shadow:0 16px 40px rgba(0,0,0,.4);
}
.media-title{
  font-family:'Fraunces',serif;font-weight:500;font-size:42px;
  letter-spacing:-1px;margin-bottom:12px;line-height:1.1;
}
.media-meta{
  display:flex;align-items:center;gap:10px;
  font-size:13px;color:var(--muted);margin-bottom:20px;flex-wrap:wrap;
}
.media-rating{color:#F3D6A0;font-weight:700;}
.media-sep{width:3px;height:3px;border-radius:50%;background:var(--muted2);}
.media-overview{font-size:15px;line-height:1.75;color:#bbb;}

/* ─── TOAST ─── */
.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(12px);
  background:rgba(30,30,30,.96);border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(16px);color:#fff;font-size:13px;padding:10px 20px;
  border-radius:24px;z-index:3000;opacity:0;transition:opacity .3s,transform .3s;
  pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.5);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ─── FOOTER ─── */
footer{
  border-top:1px solid rgba(255,255,255,.05);
  padding:28px 48px;margin-top:60px;
  display:flex;align-items:center;justify-content:center;
}
footer a{font-size:14px;color:rgba(255,255,255,.3);text-decoration:none;transition:color .2s;}
footer a:hover{color:var(--red);}

/* ─── RESPONSIVE ─── */
@media(max-width:768px){
  .nav{padding:0 18px;height:56px;}
  body{padding-top:56px;}
  .logo{font-size:16px;}
  .watch-container{padding:0 16px;margin:16px auto;}
  .media-details{padding:20px;margin-top:20px;}
  .media-title{font-size:28px;}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav" id="nav">
  <a class="logo" href="index.html">REE<span style="color:#fff">LIX</span></a>
  <div class="nav-right">
    <a class="nav-btn" href="index.html">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      Exit Player
    </a>
  </div>
</nav>

<!-- WATCH CONTENT -->
<div class="watch-container">
  <div class="video-wrapper" id="video-container">
    <!-- Stream Player Embeds Here -->
  </div>

  <div class="media-details">
    <h1 class="media-title" id="media-title">Loading Stream...</h1>
    <div class="media-meta" id="media-meta"></div>
    <p class="media-overview" id="media-overview"></p>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- FOOTER -->
<footer>
  <a href="mailto:cinemanest@proton.me">cinemanest@proton.me</a>
</footer>

<script>
const API_KEY = '1d3ae144acfb6bfcb25f70361cedcf29';
const API = 'https://api.themoviedb.org/3';

function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function getUrlParams() {
  const params = {};
  window.location.search.replace(/[?&]+([^=&]+)=([^&]*)/gi, function(str, key, value) {
    params[key] = value;
  });
  return params;
}

async function loadStream() {
  const params = getUrlParams();
  const id = params.id;
  const type = params.type || 'movie';

  if (!id) {
    document.getElementById('media-title').innerText = 'No Media Selection';
    document.getElementById('media-overview').innerText = 'Please return to the home page to select content.';
    return;
  }

  // Inject Player Embed (Using a common free alternative player structure for TMDB ids)
  const videoContainer = document.getElementById('video-container');
  const embedUrl = type === 'tv' 
    ? `https://vidsrc.to/embed/tv/${id}`
    : `https://vidsrc.to/embed/movie/${id}`;
  
  videoContainer.innerHTML = `<iframe src="${embedUrl}" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;

  // Fetch meta details to update UI styling cleanly
  try {
    const res = await fetch(`${API}/${type}/${id}?api_key=${API_KEY}`);
    if (!res.ok) throw new Error('Details lookup failed');
    const data = await res.json();

    document.getElementById('media-title').innerText = data.title || data.name || 'Unknown Title';
    document.getElementById('media-overview').innerText = data.overview || 'No description available.';
    
    const year = (data.release_date || data.first_air_date || '').slice(0, 4);
    const runtime = data.runtime ? `${Math.floor(data.runtime/60)}h ${data.runtime%60}m` : (data.number_of_seasons ? `${data.number_of_seasons} Season${data.number_of_seasons>1?'s':''}` : '');
    const rating = data.vote_average ? '★ ' + data.vote_average.toFixed(1) : '';
    const genres = (data.genres||[]).slice(0, 3).map(g => g.name).join(' · ');

    document.getElementById('media-meta').innerHTML = `
      ${rating ? `<span class="media-rating">${rating}</span><span class="media-sep"></span>` : ''}
      ${year ? `<span>${year}</span>` : ''}
      ${runtime ? `<span class="media-sep"></span><span>${runtime}</span>` : ''}
      ${genres ? `<span class="media-sep"></span><span>${genres}</span>` : ''}
    `;
  } catch (e) {
    console.warn('Could not parse live content data details:', e);
    document.getElementById('media-title').innerText = 'Streaming Content';
  }
}

window.addEventListener('DOMContentLoaded', loadStream);
</script>
</body>
</html>
