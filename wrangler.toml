name = "reelix"
main = "cloudflare-worker.js"
compatibility_date = "2024-09-23"

# Non-secret config can go here as plain vars.
# Set this to your primary/canonical domain (used as a fallback origin
# when the request's Origin header isn't in the ALLOWED_ORIGINS list
# hardcoded in cloudflare-worker.js).
[vars]
ALLOWED_ORIGIN = "https://www.reelix.2bd.net"

# ── SECRETS — do NOT put these here, and do NOT commit them ──
# Set each of these once via the CLI instead (they're stored encrypted
# in Cloudflare, not in your repo):
#
#   wrangler secret put TMDB_API_KEY
#   wrangler secret put FIREBASE_API_KEY
#   wrangler secret put FIREBASE_PROJECT_ID
#   wrangler secret put FIREBASE_CLIENT_EMAIL
#   wrangler secret put FIREBASE_PRIVATE_KEY
#   wrangler secret put SELAR_SECRET
#
# FIREBASE_PRIVATE_KEY: paste the full PEM key from your Firebase service
# account JSON, including the ----BEGIN/END PRIVATE KEY---- lines.
# Wrangler will prompt you to paste the value — literal newlines are fine.
